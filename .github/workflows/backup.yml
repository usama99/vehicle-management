name: Weekly Database Backup

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary openpyxl

      - name: Export backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python backup_script.py

      - name: Send email with backup
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Vehicle Management - Weekly Backup"
          body: "Please find attached your weekly trip data backup."
          to: usamaijaz404@gmail.com,Saeedejaz36@yahoo.com,ameermuavia212@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          attachments: trips_backup.xlsx